name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy
      # Tests with a branch-coverage gate. The floor (92%) covers the
      # unit-testable pipeline; cli.py and render_site.py are omitted as
      # orchestration/rendering glue (see pyproject [tool.coverage.run]).
      - run: uv run pytest -q --cov=scorecard_pipeline --cov-branch --cov-fail-under=92
      # Accessibility design-token contrast gate (ACCESSIBILITY-STANDARD.md): the
      # site declares WCAG 2.2 AAA, so every text/background token pair, across all
      # themes, must clear the 7:1 enhanced-contrast bar. Merge-blocking.
      - run: uv run python scripts/check_contrast.py
      # Plain-language readability gate: every curated what/why/fix string in
      # notices.TRANSLATIONS must clear the sentence-length and reading-ease
      # bars, so the plain-language promise is enforced, not just intended.
      - run: uv run python scripts/check_readability.py
      # Registry hygiene report. Informational while the catalog-sourced cohort
      # still carries feed-descriptor names (cleared on the next network re-sync);
      # switch to `--strict` once that backlog is gone to fail on regressions.
      - run: uv run scorecard lint
