name: E2E

# Behavioral browser tests over the statically served site (pipeline/tests/e2e):
# hash-route smoke tests, the artifact-fetch failure path, keyboard-only flows,
# and SPA/prerendered parity. A separate workflow so ci.yml's merge gate stays
# fast and browser-free; the unit run deselects these via -m "not e2e"
# (pipeline/pyproject.toml [tool.pytest.ini_options]).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      # The e2e dependency group brings pytest-playwright on top of dev.
      - run: uv sync --locked --group e2e
      - name: Install the Playwright chromium
        run: uv run playwright install --with-deps chromium
      # The explicit -m e2e overrides the default deselection in addopts.
      - run: uv run pytest tests/e2e -m e2e
