name: Deploy site

on:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Deploy gate for the declared quality bar (CLAUDE.md: "Lighthouse
  # accessibility score >= 95"): render and assemble _site exactly as a11y.yml
  # does, serve it locally, and assert the score with Lighthouse CI. Thresholds
  # live in lighthouserc.json at the repo root; only the accessibility category
  # is asserted because that is the only category the >=95 claim covers (BL-12).
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Install the pipeline
        working-directory: pipeline
        run: uv sync --locked
      - name: Render the static site
        working-directory: pipeline
        run: uv run scorecard render-site
      - name: Assemble the Pages site (mirrors deploy)
        run: |
          mkdir -p _site/data
          cp -r web/. _site/
          cp -r data/artifacts _site/data/artifacts
      - name: Lighthouse CI (accessibility >= 95)
        run: |
          python3 -m http.server 8080 --directory _site &
          SRV=$!
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8080/ >/dev/null && break; sleep 1; done
          npx --yes @lhci/cli@0.14 autorun
          kill $SRV

  deploy:
    needs: lighthouse
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
      - name: Assemble static site
        run: |
          mkdir -p _site/data
          cp -r web/. _site/
          cp -r data/artifacts _site/data/artifacts
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site
      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
        id: deployment
