name: Realtime monitor

# Longitudinal GTFS-Realtime health (docs/expansion.md Phase B, ADR 0012). On a
# cron, take a short sampling burst of every agency's realtime feeds and append
# one uptime/freshness observation per agency to data/rt-health. The daily and
# intraday renders read that record and show realtime reliability on each page.
#
# This is the serverless tier: a cron cannot poll on the spec's 30-60s cadence,
# so each run samples a small burst and the record accumulates coverage across
# runs. Escalation to a continuous worker fleet is documented, not built.

on:
  schedule:
    - cron: "17 */3 * * *" # every three hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rt-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Sample realtime feeds
        working-directory: pipeline
        run: uv run scorecard rt-health
      - name: Commit observations
        run: |
          git config user.name "scorecard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/rt-health
          if git diff --cached --quiet; then
            echo "No realtime observations this run."
          else
            git commit -m "chore(rt): realtime health observations"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then break; fi
              echo "push rejected (main moved); rebasing and retrying ($attempt)"
              git fetch origin main
              git rebase origin/main || { git rebase --abort; exit 1; }
              sleep 3
            done
          fi
