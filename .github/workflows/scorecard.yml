name: Daily scorecard

# Fans the daily run out across parallel shards so wall-clock stays flat as the
# registry grows (docs/roadmap.md, Year 1). Each shard scores its own agencies
# and uploads only their artifacts; a single collect job rebuilds the index and
# rollups deterministically, then commits and deploys.

on:
  schedule:
    # 13:23 UTC = early morning Pacific, before agency business hours
    - cron: "23 13 * * *"
  workflow_dispatch:
    inputs:
      shards:
        description: "number of parallel shards"
        default: "12"

# Least privilege by default; the collect and deploy jobs widen it per-job.
permissions:
  contents: read

env:
  # National scale: ~1,166 agencies fan out across more shards to keep each
  # shard's wall-clock down (ADR 0005). Override per-run via workflow_dispatch.
  SHARD_COUNT: ${{ github.event.inputs.shards || '12' }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.plan.outputs.shards }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - id: plan
        working-directory: pipeline
        run: echo "shards=$(uv run scorecard shards --count "$SHARD_COUNT")" >> "$GITHUB_OUTPUT"

  score:
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for the optional S3 validator cache
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      # Read/write the S3 validator-result cache so unchanged feeds skip the Java
      # validator across runners and days. Gated on ARTIFACTS_BUCKET, so forks and
      # the pilot (no variable) skip it and the cache stays file-only.
      - name: Authenticate to AWS
        if: ${{ vars.ARTIFACTS_BUCKET != '' }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
      - name: Score this shard's agencies
        working-directory: pipeline
        env:
          # Empty when ARTIFACTS_BUCKET is unset, which the cache treats as off.
          VALIDATOR_CACHE_BUCKET: ${{ vars.ARTIFACTS_BUCKET }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
          # CDN base for the corrected-feed download link. Set only when this repo
          # publishes to S3 (the pilot); empty for forks, which then show the CLI
          # hint instead of a download button. The zip itself reaches the CDN via
          # the collect job's `aws s3 sync data/artifacts`.
          SCORECARD_CDN_BASE: ${{ vars.ARTIFACTS_BUCKET != '' && format('https://{0}', vars.ARTIFACTS_CDN || 'd14aimrgrbaz2a.cloudfront.net') || '' }}
        run: |
          # One agency's feed being unreachable (a 403, a vendor outage) must not
          # abort the shard and skip the whole daily refresh. Score each agency
          # independently; a failure is a warning, and the agencies that did score
          # are still published.
          #
          # Stage only the agencies this shard actually scores into a clean dir.
          # checkout populates data/artifacts with every agency's committed copy,
          # so uploading the whole tree let a later shard's stale copy overwrite
          # this shard's fresh score when collect merged them (merge-multiple is
          # last-writer-wins), silently reverting ~11/12 of agencies each run.
          # Uploading per-scored-agency makes that merge a clean union.
          stage="$GITHUB_WORKSPACE/shard-artifacts"
          rm -rf "$stage"
          mkdir -p "$stage"
          echo '${{ toJSON(matrix.shard) }}' | jq -r '.[]' | while read -r id; do
            echo "::group::$id"
            uv run --with boto3 scorecard run --agency "$id" --skip-unchanged && EXIT=0 || EXIT=$?
            if [ $EXIT -eq 0 ]; then
              mkdir -p "$stage/$id"
              cp -a "$GITHUB_WORKSPACE/data/artifacts/$id/." "$stage/$id/"
            elif [ $EXIT -eq 2 ]; then
              echo "feed unchanged, keeping last artifact"
            else
              echo "::warning title=scoring failed::$id did not score this run (kept its last good artifact)"
            fi
            echo "::endgroup::"
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: artifacts-${{ strategy.job-index }}
          path: shard-artifacts
          retention-days: 1
          if-no-files-found: ignore

  collect:
    needs: score
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit + push refreshed artifacts
      id-token: write # OIDC for the optional CDN mirror
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Gather shard artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: data/artifacts
      - name: Fetch NTD annual ridership (rider-trips weighting, ADR 0021)
        working-directory: pipeline
        run: |
          uv run scorecard ntd-ridership --fetch \
            || echo "::warning title=ridership fetch failed::rider-trips weighting will use the last snapshot (or be omitted) this run"
      - name: Rebuild index, rollups, and static SEO pages
        working-directory: pipeline
        run: |
          uv run scorecard reindex
          uv run scorecard rollups
          uv run scorecard render-site
      - name: Vendor support report
        working-directory: pipeline
        run: |
          echo "## Vendor support snapshot" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Internal tool — shows which feed hosts have the most expiry problems. Not public._" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          uv run scorecard vendor-report --format markdown >> "$GITHUB_STEP_SUMMARY" || true
      - name: Commit refreshed artifacts
        run: |
          git config user.name "scorecard-bot"
          git config user.email "actions@users.noreply.github.com"
          # The generated web/ roots come from the manifest render-site emitted
          # (build/render-manifest.txt), so a newly added page is always published
          # and can never be silently dropped by a hand-typed list that drifts.
          # data/artifacts (scores + directory.json) is a scoring output, added
          # explicitly. The manifest lists only generated paths, so hand-authored
          # web/src, the static *.html, web/app, and web/tiles stay excluded.
          test -s build/render-manifest.txt || { echo "render manifest missing; render-site did not run"; exit 1; }
          paths="data/artifacts $(tr '\n' ' ' < build/render-manifest.txt)"
          git add $paths
          if git diff --cached --quiet; then
            echo "No artifact changes today."
            exit 0
          fi
          git commit -m "chore(data): daily scorecard refresh"
          # main can move during a multi-minute run (a merge, or another push).
          # Do NOT rebase: this commit is regenerated artifacts, including binary
          # files (web/api/v1/agencies.parquet) and large JSON/HTML that both this
          # run and whatever moved main rewrite wholesale, so a 3-way rebase
          # conflicts on essentially every file and aborts. Instead replay our
          # freshly generated files on top of the latest main. Our content is
          # authoritative by construction (it was just regenerated from the newest
          # scores), and main's non-artifact changes are preserved because we reset
          # onto it and only re-add the generated paths.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push rejected (main moved); replaying generated files onto latest main ($attempt)"
            git fetch origin main
            ours=$(git rev-parse HEAD)
            git reset --hard origin/main
            # Replay our generated tree onto latest main. git restore (no-overlay)
            # re-applies modifications, additions, AND deletions for these paths, so
            # a page/artifact this run pruned is actually removed; a plain
            # `git checkout -- $paths` is overlay-only and would leave it behind.
            git restore --source="$ours" --staged --worktree -- $paths
            if git diff --cached --quiet; then
              echo "latest main already carries these artifacts; nothing to push."
              exit 0
            fi
            git commit -m "chore(data): daily scorecard refresh"
            sleep 3
          done
          echo "still rejected after retries; failing so the run is visible."
          exit 1

      # Mirror to the CloudFront-backed bucket once infra/artifacts is applied.
      # Gated on the ARTIFACTS_BUCKET repo variable, so the pilot and forks
      # (which set no variable) skip it entirely and keep serving from Pages.
      - name: Authenticate to AWS
        if: ${{ vars.ARTIFACTS_BUCKET != '' || vars.SES_FROM != '' }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
      - name: Publish artifacts to S3
        if: ${{ vars.ARTIFACTS_BUCKET != '' }}
        run: |
          # Additive sync (no --delete): S3 is the durable record of every dated
          # artifact, so it must keep history that a fresh collect checkout does
          # not carry. Pruning is handled by a bucket lifecycle policy, not here.
          aws s3 sync data/artifacts "s3://${{ vars.ARTIFACTS_BUCKET }}/data/artifacts" \
            --cache-control "max-age=300"

      # Send opt-in feed-health emails to confirmed subscribers in the DynamoDB
      # store. Gated on SES_FROM, so it is off until an operator verifies an SES
      # sender and sets SES_FROM. boto3 is pulled in per-run. ALERTS_API_BASE puts
      # a working unsubscribe link in each email.
      - name: Send feed-health digest
        if: ${{ vars.SES_FROM != '' }}
        working-directory: pipeline
        env:
          SUBSCRIPTIONS_TABLE: gtfs-scorecard-subscriptions
          ALERTS_API_BASE: https://5oemr66b9a.execute-api.us-west-2.amazonaws.com
        run: uv run --with boto3 scorecard notify --send --from "${{ vars.SES_FROM }}"

      # The digest silently never sending is worse than it loudly not sending:
      # if the variable is unset, say so in the run summary every day so an
      # operator who expected email notices the gap the first day, not weeks in.
      - name: Note when the digest is off
        if: ${{ vars.SES_FROM == '' }}
        run: |
          echo "::warning title=feed-health digest is off::SES_FROM is unset, so no expiry emails were sent this run. Set the SES_FROM Actions variable (docs/deploy.md §2) to turn sending on."

  # Pushes made with GITHUB_TOKEN do not trigger the push-driven pages
  # workflow, so deploy explicitly after the refresh.
  deploy:
    needs: collect
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
