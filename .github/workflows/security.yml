# Security scanning — SAST (Semgrep) + secret detection (gitleaks).
# Implements SECURITY-AND-SUPPLY-CHAIN-STANDARD backlog #4. Both jobs are
# BLOCKING (no `|| true`): a finding fails the check and blocks the PR.

name: security

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; the secret-scan job widens to read PR metadata.
permissions:
  contents: read

# Cancel superseded runs on the same ref (new push to a PR) to save minutes.
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks-action enumerates PR commits via the API
    steps:
      - name: Checkout (full history so push scans cover all new commits)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          # Required for PR scans — the action reads PR commits via the API.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Report via the job summary only; commenting would need write scope.
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"
          # No GITLEAKS_LICENSE: this is a personal (single-user) account, which
          # gitleaks-action exempts from the org-license requirement.

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Semgrep scan (blocking on ERROR severity)
        # Pinned tool version; default + python registry rulesets. --severity
        # ERROR limits findings to high-severity rules (HIGH/CRITICAL) and
        # --error makes any such finding fail the build (no `|| true`).
        run: >
          uvx --from semgrep==1.168.0 semgrep scan
          --config p/default
          --config p/python
          --severity ERROR
          --error
          --metrics off
