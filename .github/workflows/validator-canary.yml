name: Validator canary

# Governed validator upgrades (FIX-06): before a VALIDATOR_VERSION bump lands,
# shadow-score a deterministic national sample with the pinned AND the candidate
# validator jars, diff per-agency grades and per-code notice populations, and
# publish the impact report as a build artifact. The report carries a
# ready-to-paste METHODOLOGY_CHANGELOG entry; the PR that bumps the version must
# attach it (see docs/rubric.md, "Governed upgrades"). The baseline half reuses
# the committed/S3 validator-result cache, so only the candidate half pays for
# fresh Java runs.

on:
  workflow_dispatch:
    inputs:
      candidate_version:
        description: "gtfs-validator version to shadow-score, e.g. 8.1.0"
        required: true
      sample_size:
        description: "agencies to dual-score (deterministic sample)"
        default: "100"
      seed:
        description: "rotate the deterministic sample"
        default: "0"

permissions:
  contents: read

concurrency:
  group: validator-canary
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for the optional S3 validator cache
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      # Read the S3 validator-result cache so the baseline (pinned-version) half
      # skips Java for feeds the daily run already validated. Gated on
      # ARTIFACTS_BUCKET, so forks skip it and the cache stays file-only.
      - name: Authenticate to AWS
        if: ${{ vars.ARTIFACTS_BUCKET != '' }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
      - name: Shadow-score the sample with both validator versions
        working-directory: pipeline
        env:
          # Empty when ARTIFACTS_BUCKET is unset, which the cache treats as off.
          VALIDATOR_CACHE_BUCKET: ${{ vars.ARTIFACTS_BUCKET }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
        run: |
          uv run --with boto3 scorecard canary \
            --candidate-version "${{ inputs.candidate_version }}" \
            --sample-size "${{ inputs.sample_size }}" \
            --seed "${{ inputs.seed }}" \
            --out "$GITHUB_WORKSPACE/canary-report"
      - name: Publish the report to the step summary
        run: cat canary-report/*.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload the impact report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: validator-canary-report
          path: canary-report
          retention-days: 90
