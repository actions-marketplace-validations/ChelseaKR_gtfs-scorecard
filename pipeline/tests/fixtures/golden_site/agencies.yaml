# Agencies tracked by the scorecard.
#
# To add yours, copy a block below and fill in your feed URLs; the full
# walkthrough is docs/add-your-agency.md. The daily pipeline picks up new
# entries automatically after merge.
#
# Fields:
#   id               short slug, lowercase letters/digits/hyphens (required)
#   name             shown on the scorecard (required)
#   static_gtfs_url  direct link to your GTFS zip (required)
#   rt_urls          GTFS-Realtime endpoints, if published without a key:
#                    trip_updates / vehicle_positions / service_alerts
#   rt_note          shown when realtime exists but can't be scored yet
#   license_note     the data license, or where its absence is documented
#   operating_note   a curator's verified status after a manual check, mainly
#                    for long-expired feeds (e.g. "Confirmed still operating as
#                    of 2026-06; the vendor stopped refreshing the export.").
#                    Shown on the scorecard and the directory.
#   mdb_id           the feed's Mobility Database source id, when known. Lets
#                    feed discovery follow the catalog by id, so a moved URL is
#                    caught exactly instead of by fuzzy name match.
#   ntd_id           the agency's five-digit National Transit Database ID, when
#                    known. Matching GTFS agency_id to the NTD ID is an optional
#                    convenience (the July 2025 final rule links the two on the
#                    P-50 form instead of requiring a feed change). When set,
#                    the scorecard checks whether the feed's agency_id matches,
#                    framed as optional and never as a penalty. Quote it so a
#                    leading zero is kept. Omit if unknown; the check is then
#                    shown as not-yet-checked.
#   ntd_note         curator-recorded NTD reporting context the feed cannot
#                    express: a shared regional feed (several agencies, one
#                    export), an FTA waiver, or another arrangement (e.g.
#                    "Reports under the shared regional feed operated by X" or
#                    "Holds an FTA technical-assistance waiver for RY2026").
#                    Shown with the NTD readiness box so the agency is never
#                    read as flagged for identity it does not own.

agencies:
  - id: unitrans
    name: Unitrans (ASUCD / City of Davis)
    static_gtfs_url: https://unitrans.ucdavis.edu/media/gtfs/Unitrans_GTFS.zip
    ntd_id: "90142"
    license_note: No stated data license (UC Regents copyright); see docs/feeds.md.
    # GTFS-RT exists via UmoIQ but requires an API key; see docs/feeds.md.
    rt_note: >-
      Unitrans runs live bus tracking, but its data feed needs an access key
      we don't have yet. Nothing here counts against the grade.

  - id: yolobus
    name: Yolobus (Yolo County Transportation District)
    static_gtfs_url: https://avl.yctd.org/RealTime/google_transit.zip
    ntd_id: "90090"
    license_note: No stated data license; see docs/feeds.md.
    rt_urls:
