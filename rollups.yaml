# Program rollups: portfolio views across many agencies, for the people who
# support them (a Caltrans district liaison, a statewide data program). Each
# rollup is published as static JSON the web app reads at #/program/<id>.
#
# Fields:
#   id        short slug used in the URL (required)
#   name      shown on the rollup page (required)
#   all       true to include every tracked agency
#   members   explicit list of agency ids (ignored when all: true)
#   state     auto-include every agency in this state, e.g. CA (no member list;
#             uses the state persisted in each agency's artifact)
#
# With no rollups.yaml at all, a single "all tracked agencies" rollup is still
# produced, so this file only adds named groups on top of that default.

